<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DWTI 懂王人格测试 - 有点东西大会</title>
    <style>
        :root { --dw-green: #00FF00; --bg-black: #050505; }
        body { margin: 0; background: var(--bg-black); color: white; font-family: -apple-system, sans-serif; overflow-x: hidden; }
        #app { max-width: 500px; margin: 0 auto; padding: 20px; min-height: 100vh; display: flex; flex-direction: column; justify-content: center; }
        .progress { font-size: 14px; color: #666; margin-bottom: 10px; }
        .question-box h2 { font-size: 24px; margin-bottom: 30px; line-height: 1.4; }
        .option { 
            background: #1a1a1a; border: 1px solid #333; padding: 15px 20px; 
            margin-bottom: 15px; border-radius: 12px; cursor: pointer; transition: 0.2s;
        }
        .option:active { background: var(--dw-green); color: black; border-color: var(--dw-green); }
        .result-page { text-align: center; display: none; }
        .result-title { color: var(--dw-green); font-size: 32px; font-weight: bold; margin-bottom: 10px; }
        .result-desc { color: #ccc; line-height: 1.6; font-size: 15px; text-align: left; background: #111; padding: 20px; border-radius: 15px; }
        .btn-go { 
            margin-top: 30px; background: var(--dw-green); color: black; 
            padding: 15px 40px; border-radius: 30px; font-weight: bold; text-decoration: none; display: inline-block;
        }
    </style>
</head>
<body>

<div id="app">
    <div id="quiz-container">
        <div class="progress" id="progress">Question 1 / 20</div>
        <div class="question-box">
            <h2 id="q-text">正在加载题目...</h2>
            <div id="options"></div>
        </div>
    </div>

    <div id="result-page" class="result-page">
        <div class="result-title" id="res-name"></div>
        <div id="res-icon" style="font-size: 60px; margin: 20px 0;"></div>
        <div class="result-desc" id="res-desc"></div>
        <a href="#" class="btn-go">5.16 来有点东西大会线下见</a>
    </div>
</div>

<script>
    const questions = [
        { q: "另一半花3倍溢价买了个“漂亮破烂”还问你美不美？", options: ["咬碎后槽牙：美！买、得、好！", "恋爱可以谈，乱花钱忍不了，分！", "谢邀，寡王赚钱寡王花。"], type: "love" },
        // ... 此处根据你的需求补充完整20道题
    ];

    const results = {
        "BOSS": { name: "【满级懂王】BOSS", icon: "💎", desc: "你是鄙视链顶端的那个人。别人买鞋看款式，你买鞋看公差... 5.16 来线下唠到尽兴。" },
        "DEAD-BRO": { name: "【活死人】DEAD-BRO", icon: "🗿", desc: "已然如雕像般心如止水。5.16 适合来有点东西小镇躺平公园睡一觉。" },
        "HAHA": { name: "【赛博乐子人】HAHA", icon: "🤡", desc: "别人吵架你递刀，别人emo你倒立。5.16 重庆现场素材管够，等你整活。" }
    };

    let currentIndex = 0;
    let scores = { knowledge: 0, chill: 0, love: 0 };

    function renderQuestion() {
        if (currentIndex >= questions.length) {
            showResult();
            return;
        }
        const q = questions[currentIndex];
        document.getElementById('progress').innerText = `Question ${currentIndex + 1} / 20`;
        document.getElementById('q-text').innerText = q.q;
        const optionsDiv = document.getElementById('options');
        optionsDiv.innerHTML = '';
        q.options.forEach((opt, i) => {
            const div = document.createElement('div');
            div.className = 'option';
            div.innerText = opt;
            div.onclick = () => next(i);
            optionsDiv.appendChild(div);
        });
    }

    function next(optIndex) {
        // 简化的逻辑判断：这里可以根据你提供的Q1-Q20逻辑进行细化
        if (optIndex === 2) scores.chill++; 
        currentIndex++;
        renderQuestion();
    }

    function showResult() {
        document.getElementById('quiz-container').style.display = 'none';
        const resPage = document.getElementById('result-page');
        resPage.style.display = 'block';
        
        // 简单示例逻辑：如果第三个选项选得多，就是活死人
        let final = scores.chill > 0 ? "DEAD-BRO" : "BOSS";
        
        document.getElementById('res-name').innerText = results[final].name;
        document.getElementById('res-icon').innerText = results[final].icon;
        document.getElementById('res-desc').innerText = results[final].desc;
    }

    renderQuestion();
</script>
</body>
</html>
