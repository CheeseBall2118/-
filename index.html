<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DWTI懂王测试</title>
    <style>
        :root { --dw-green: #00FF00; --bg-black: #050505; }
        body { margin: 0; background: var(--bg-black); color: white; font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif; overflow-x: hidden; }
        #app { max-width: 500px; margin: 0 auto; padding: 25px; min-height: 100vh; display: flex; flex-direction: column; justify-content: center; }
        .progress { font-size: 12px; color: #666; margin-bottom: 15px; letter-spacing: 1px; font-family: monospace; }
        .q-box h2 { font-size: 20px; margin-bottom: 30px; line-height: 1.5; font-weight: bold; }
        
        /* 基础选项样式 */
        .opt { 
            background: #111; 
            border: 1px solid #222; 
            padding: 18px; 
            margin-bottom: 12px; 
            border-radius: 12px; 
            cursor: pointer; 
            transition: background 0.1s, color 0.1s; 
            font-size: 15px; 
            line-height: 1.4; 
        }

        /* 选中后的视觉反馈 - 解决切换瞬间的残留问题 */
        .opt.selected { 
            background: var(--dw-green) !important; 
            color: black !important; 
            font-weight: bold; 
            border-color: var(--dw-green);
        }

        .res-page { display: none; text-align: center; animation: slideUp 0.6s ease-out; padding-bottom: 40px; }
        .res-name { color: var(--dw-green); font-size: 28px; font-weight: 900; margin-bottom: 5px; }
        .res-id { font-size: 18px; color: #fff; margin-bottom: 15px; font-style: italic; }
        .radar-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; background: #111; padding: 15px; border-radius: 12px; margin: 20px 0; font-size: 10px; text-align: center; border: 1px solid #222; }
        .radar-val { color: var(--dw-green); display: block; font-size: 14px; font-weight: bold; }
        .res-desc { text-align: left; line-height: 1.8; font-size: 14px; color: #bbb; background: #161616; padding: 20px; border-radius: 12px; margin-bottom: 25px; }
        .tag-row { color: var(--dw-green); font-size: 13px; margin-top: 15px; font-weight: bold; text-align: left; }
        .footer-btn { background: var(--dw-green); color: black; padding: 16px 40px; border-radius: 40px; font-weight: bold; text-decoration: none; display: inline-block; width: 80%; box-shadow: 0 4px 15px rgba(0,255,0,0.3); }
        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div id="app">
    <div id="quiz-ui">
        <div class="progress" id="progress">LOADING...</div>
        <div class="q-box">
            <h2 id="q-text"></h2>
            <div id="options"></div>
        </div>
    </div>
    
    <div id="res-ui" class="res-page">
        <div id="res-icon" style="font-size: 60px; margin-bottom: 10px;"></div>
        <div class="res-name" id="res-name"></div>
        <div class="res-id" id="res-id"></div>
        <div class="radar-grid" id="res-radar"></div>
        <div class="res-desc" id="res-desc"></div>
        <div class="tag-row" id="res-tags"></div>
        <a href="https://dw4.co/t/A/1vB9oucZI" class="footer-btn" style="margin-top:25px;">5.16-5.17 我在好东西大会等你！</a>
    </div>
</div>

<script>
    const questions = [
        { q: "Q1.【两性题】另一半花3倍溢价买了个“漂亮破烂”还问你美不美，你会：", opts: [{t:"A. 咬碎后槽牙：“美！买、得、好！”"}, {t:"B. 恋爱可以谈，乱花钱忍不了，分！"}, {t:"C. 谢邀，寡王赚钱寡王花，根本没这种烦恼。", cat:"dead"}] },
        { q: "Q2.【两性题】玩鹅鸭杀被另一半贴脸开刀、疯狂背刺，你：", opts: [{t:"A. 起身坐起来，并说：我要开始用手玩了"}, {t:"B. 嘿嘿，TA连刀我的时候都这么可爱", cat:"love"}, {t:"C. 慕了，在哪发能一起打游戏的对象"}] },
        { q: "Q3.【知识题】什么是海景谷？", opts:[{t:"A. 海边麦田形成的风吹麦浪特色地貌", cat:"fear"}, {t:"B. 《我的世界》大佬在海边挖的巨型仓库", cat:"curious"}, {t:"C. 极稀少、溢价飞天的顶级周边", isCorrect: true, cat:"stable"}] },
        { q: "Q4.【两性题】另一半送了你“极贵但巨丑”的生日礼物，你会：", opts:[{t:"A. 还要啥自行车？送我就不错了", cat:"love"}, {t:"B. 下次直接折现转我支付宝行不行", cat:"strong"}, {t:"C. 你问我这种问题？礼貌吗？"}] },
        { q: "Q5.【两性题】发现另一半手机里有个“私密相册”，你第一反应：", opts: [{t:"A. 不看保平安", cat:"stable"}, {t:"B. 密码不交今晚别想睡", cat:"strong"}, {t:"C. 我只有表情包，小丑竟是我自己", cat:"haha"}] },
        { q: "Q6.【知识题】常说的“倒闭款”，到底惨到什么程度？", opts: [{t:"A. 丑到莆田工厂都懒得开模", cat:"curious"}, {t:"B. 跌破发售价，黄牛含泪亏本甩卖", isCorrect: true, cat:"stable"}, {t:"C. 路人无感，根本分不清爆款还是倒闭款", cat:"fear nfb"}] },
        { q: "Q7.【两性题】五排上分生死局，另一半突然心情不好打电话求安慰，你：", opts:[{t:"A. 果断挂机！兄弟如手足，对象是心肝！", cat:"love"}, {t:"B. 手机免提一开：“宝宝你怎么了（快上大招！）”", cat:"stable"}, {t:"C. 挂断，回微信：“开团呢，等下说。”", cat:"dead strong"}] },
        { q: "Q8.【两性题】撞见好兄弟的对象在外面跟别人牵手，你：", opts: [{t:"A. 直接拍照发他：哥们儿可以绿，不能被蒙"}, {t:"B. 疯狂暗示他查岗但绝不挑明，怕最后我成了恶人", cat:"strong"}, {t:"C. 关我屁事？别影响周末开黑就行", cat:"nfb", isMustNfb: true}] },
        { q: "Q9.【态度题】对于“买鞋热缩膜抽真空，供在墙上不落地”的行为，你怎么看？", opts:[{t:"A. 纯纯大病，不穿等它氧化了报废吗？"}, {t:"B. 瞎叫什么，这叫流动的理财产品", cat:"hunter"}, {t:"C. 买不起，打扰了", cat:"stable"}] },
        { q: "Q10.【态度题】得物95分卖东西，遇到那种上来就说“我是学生，50块卖我行不行（原价500）”的人，你会：", opts:[{t:"A. 素质回复：“不好意思呢亲，不议价。”", cat:"hunter"}, {t:"B. 已读不回，直接拉黑", cat:"dead"}, {t:"C. 反向折磨：“我是孤儿，你倒贴 50 拿走吧。”", cat:"haha"}] },
        { q: "Q11.【态度题】关于男人的“副驾座位”，你的规矩是：", opts: [{t:"A. 除了老婆/女朋友，亲妈来了都得坐后排", cat:"love"}, {t:"B. 谁先上车谁坐，没有那么多规矩", cat:"nfb"}, {t:"C. 放我绝版球衣和外卖，人都给我去挤后排", cat:"strong"}] },
        { q: "Q12.【态度题】潮人兄弟买了个“土掉渣”挂件挂在限量包上，你觉得他：", opts: [{t:"A. 审美突发性休克，建议挂个脑科急诊", cat:"haha"}, {t:"B. 返璞归真，土到极致就是潮，大俗即大雅", cat:"stable"}, {t:"C. 恋爱脑发作，和对象挂的情侣款"}] },
        { q: "Q13.【态度题】男生在社交软件上的头像，哪种最让你觉得“油腻”？", opts: [{t:"A. 坐在豪车方向盘前，露出名表的不露脸照片"}, {t:"B.健身房对镜自拍，故意掀起衣服露出八块肌和半条内裤边"}, {t:"C. 纯黑的背景，或者一张极其非主流的伤感动漫男头"}] },
        { q: "Q14.【知识题】当一个Bro对着你的新电脑感叹“你这显卡能压住火光吗？”，他其实在：", opts: [{t:"A. 担心你的机箱着火，建议你赶紧买个灭火器", cat:"curious"}, {t:"B. 询问你玩《黑神话：悟空》这种吃配置的大作顺不顺", isCorrect: true, cat:"stable"}, {t:"C. 讽刺你的散热器声音太大，像直升机起飞", cat:"fear"}] },
        { q: "Q15.【知识题】抽盲盒时，所谓的“端盒”是指：", opts: [{t:"A. 这一盒太重了，得用两只手端着走", cat:"curious"}, {t:"B. 既然抽不到隐藏，索性整箱买断，暴力拆解", isCorrect: true, cat:"hunter stable"}, {t:"C. 把空的盲盒卖给收废品的，主打一个回血", cat:"fear"}] },
        { q: "Q16.【态度题】当你在路上偶遇库里，你会：", opts:[{t:"A. 当场给他在路边唱跳库里之歌，库里库里库里库里……", cat:"haha"}, {t:"B. 立马要合照签名，反手发到朋友圈，这波面子拉满", cat:"strong"}, {t:"C. 库里算什么，老詹才是NBA唯一真神"}] },
        { q: "Q17.【知识题】什么是“重塑版（Restock/Retro）”", opts: [{t:"A. 品牌良心发现，给老玩家补货", cat:"fear"}, {t:"B. 换个配色继续割，资本家榨干最后一点剩余价值", cat:"hunter curious"}, {t:"C. 经典回归，但材质和细节通常比初代缩水", isCorrect: true, cat:"stable"}] },
        { q: "Q18.【态度题】假如你穿越回 2000 年，你会选择：", opts: [{t:"A. 疯狂买入 AJ11乔治城，囤到今天直接退休", cat:"hunter"}, {t:"B. 在西湖边拉住马云，求他带我一起玩", cat:"curious"}, {t:"C. 倾尽所有购置核心地段房产，躺赢时代浪潮"}] },
        { q: "Q19.【态度题】你什么时候会忍不住感叹「这有点东西」：", opts: [{t:"A. 上分开黑，队友预判了对面的预判，这把稳了", cat:"stable"}, {t:"B. 潮人兄弟给我爆改，摇身一变成为第二个吴彦祖", cat:"strong"}, {t:"C. 国足踢进世界杯决赛——已经不是有点东西能解释的了", cat:"haha"}] },
        { q: "Q20.【态度题】你觉得这套 DWTI 懂王测试怎么样？", opts: [{t:"A. 纯纯搞我心态"}, {t:"B. 有点东西，转发给室友"}, {t:"C. 哈哈关我屁事", cat:"nfb", isMustNfb: true}] } 
    ];

   const personals = {
        "BOSS": { name: "【满级懂王】BOSS", id: "BOSS", icon: "💎", tags: "#版本答案 #公差判官 #圈内活百科", desc: "你是鄙视链顶端的那个人。别人买鞋看款式，你买鞋看公差；别人打游戏看输赢，你打游戏看系统代码。你平时不多废话，但只要开口，全场都要停下来拿小本本记笔记，唯有牛币才能代表你。你这么懂圈内门道的人，5.16来得物有点东西大会线下，肯定能和各路大神一见如故、唠到尽兴。" },
        "DEAD": { name: "【活死人】DEAD-BRO", id: "DEAD-BRO", icon: "🗿", tags: "#情绪免伤100% #赛博兵马俑 #已老实", desc: "游戏输了不叫，鞋子涨了不买，对象分了不哭。你已然如雕像般心如止水、无欲无求，提前步入了“赛博禅宗”，练就了顶级免伤。这该死的松弛感，是你在这个暴躁世界里唯一的重装铠甲。5月16日，适合来得物有点东西小镇躺平公园睡一觉，安静摆烂完全不用被迫社交。" },
        "STABLE": { name: "【稳稳帝】STABLE-KING", id: "STABLE-KING", icon: "📿", tags: "#你猜我懂多少 #不慌 #这才是真含金量", desc: "什么圈都懂一点，什么问题都不急着站队。你像木鱼一样通透寡言、内敛自持，你的判断有自己的逻辑，不屑跟喷子浪费口舌。这种人在任何圈子都能混，但没人知道你到底是什么段位。5.16这种全能局，没你去重庆有点东西大会Carry真的不行。" },
        "LOVE": { name: "【满分恋爱佬】SOFT-BRO", id: "SOFT-BRO", icon: "🐶", tags: "#纯爱战神 #纸老虎 #忠犬型伴侣", desc: "你是濒危物种，是当代情场的一股清流。你是世俗口中的舔狗，但只有你知道这种专一到极致的幸福。你的副驾是圣地，你的工资是贡品。你的人生圆心就是另一半，为了陪TA逛街，你能把生死局的队友全卖了。虽然在五排群里你被喷成筛子，但看到TA一个微笑，你觉得这后槽牙咬碎了也值。周末约会选不到好地方？5.16带上对象一起来得物有点东西大会，打卡出片，氛围感直接拉满，这不奖励你一个月豁免权？" },
        "NFB": { name: "【屁事哥】NFB", id: "NFB", icon: "🍹", tags: "#关我屁事 #但我测完了 #佛系路人甲", desc: "全程抱着看热闹心态做题，妥妥吃瓜无辜路人甲。这套题和你没关系，但你测完了——这才是最离谱的事。你不是不懂，只是这些事跟你的人生轨迹暂时没有交集，或者你懒得掺合。主打一个随缘看戏没事干，5.16不如来有点东西大会线下溜达一圈，不参与讨论，只负责站在第一线吃最热乎的瓜。" },
        "FEAR": { name: "【老脸往哪哥】NO-FACE", id: "NO-FACE", icon: "🤦", tags: "#学费还没交完 #真性情不装 #待解锁新人", desc: "知识题对你来说像天书。不是不聪明，就是这些圈子你确实没入坑。好在虽然知识点是盲区，但你态度挺真实，主打一个真性情不装杯。但说真的，真到聚会吹水，你确实容易老脸没地方搁。5.16建议去重庆有点东西大会突击补课，省得被朋友开除Bro籍。" },
        "HUNTER": { name: "【全职猎人】HUNTER", id: "HUNTER", icon: "🎯", tags: "#理财鬼才 #限量猎手 #不做韭菜", desc: "你深谙薅羊毛之道，对你来说蹲捡漏就像买彩票坐等惊喜开奖。你对价格的敏感度堪比华尔街操盘手，在得物蹲点不是为了消费，是为了等那个标错价的慈善卖家。你的人生终极奥义是：用最低的成本装最大的杯。在你的字典里，原价购买等于智商税。5.16得物有点东西大会现场尖货不少，懂行情、会捡漏的你千万别错过，懂的都懂。" },
        "CURIOUS": { name: "【大馋小子】CURIOUS-GUY", id: "CURIOUS-GUY", icon: "🍲", tags: "#大馋小子 #什么都想搞清楚 #永远在发现新东西", desc: "你的关注列表里什么都有：从盲盒、球鞋到大佬的创业史。你不是没重点，你只是对这世界充满了“大馋小子”式的探索欲，什么新鲜好玩的都绝不落下，哪里有新奇玩意儿哪里就有你。5.16这种什么都有、啥都好玩的有点东西大会，简直就是为你量身定做的“自助餐大餐”。" },
        "HAHA": { name: "【赛博乐子人】HAHA", id: "HAHA", icon: "🤸", tags: "#乐子人 #整活大师 #抽象天花板", desc: "别人吵架你递刀，别人emo你倒立。你是最高级的喜剧大师，也是朋友聚会里永不冷场的抽象天花板。在这个无聊的世界，你主打一个无差别攻击。只要场子够乱，你就是那个最优雅的指挥家。5.16重庆有点东西大会现场素材管够，你不去整活简直是浪费才华。" },
        "STRONG": { name: "【Strong哥】STRONGER", id: "STRONGER", icon: "🕶️", tags: "#面子至上 #嘴硬心软 #硬核Bro", desc: "你把面子刻在骨子里，天生自带strong属性。撞见兄弟对象出轨你会疯狂暗示，恋爱受了委屈也绝不低头。你发的朋友圈总是若隐若现地露出logo，虽然内心慌得一批，但表面稳如老狗。你这种人，连睡觉都得穿着最帅的那套睡衣。论怎么装才最有面，来得物有点东西大会随手赢限量款大奖，包你轻松帅出圈。" }
    };

    let idx = 0, kNum = 0, nfbMustCount = 0;
    let counts = { love: 0, dead: 0, haha: 0, strong: 0, hunter: 0, nfb: 0, stable: 0, curious: 0, fear: 0 };

    function render() {
        if(idx >= 20) return showRes();
        
        const ui = document.getElementById('quiz-ui');
        ui.style.display = 'block';
        document.getElementById('progress').innerText = `STEP ${idx+1} / 20`;
        
        const q = questions[idx];
        document.getElementById('q-text').innerText = q.q;
        const op = document.getElementById('options'); 
        op.innerHTML = '';
        
        q.opts.forEach((opt) => {
            const d = document.createElement('div'); 
            d.className = 'opt'; 
            d.innerText = opt.t;
            
            d.onclick = () => {
                // 1. 立即反馈选中状态
                d.classList.add('selected');

                // 2. 逻辑计数
                if (opt.cat) {
                    opt.cat.split(' ').forEach(c => { if(c) counts[c]++ });
                }
                if (opt.isCorrect) kNum++;
                if (opt.isMustNfb) nfbMustCount++;
                idx++;

                // 3. 延迟一拍（250ms）再渲染下一题，保证用户看到选中效果
                setTimeout(() => {
                    render();
                }, 250);
            };
            op.appendChild(d);
        });
        window.scrollTo(0, 0);
    }

    function showRes() {
        document.getElementById('quiz-ui').style.display = 'none';
        const ui = document.getElementById('res-ui');
        ui.style.display = 'block';

        let key = "";
        if (kNum === 5) key = "BOSS";
        else if (nfbMustCount === 2) key = "NFB";
        else if (counts.love >= 4) key = "LOVE";
        else if (counts.fear >= 3) key = "FEAR";

        if (key === "") {
            const candidates = ["hunter", "strong", "haha", "curious", "dead"];
            let maxVal = 0, winner = "";
            candidates.forEach(c => {
                if (counts[c] > maxVal) { maxVal = counts[c]; winner = c.toUpperCase(); }
            });
            if (maxVal >= 3) key = winner;
            else if (kNum >= 3 || counts.stable >= 4) key = "STABLE";
            else key = kNum === 0 ? "FEAR" : "DEAD";
        }

        const p = personals[key] || personals["STABLE"];

        const dynamicR = [
            Math.min(kNum * 18 + 10 + (counts.strong * 2), 100),
            Math.min(counts.hunter * 20 + (kNum * 8), 100),
            Math.min(counts.stable * 15 + (kNum * 10), 100),
            Math.max(Math.min(counts.love * 25 - (counts.dead + nfbMustCount) * 15 + 40, 100), 5),
            Math.min(counts.haha * 20 + nfbMustCount * 25, 100)
        ];
        const labels = ["战力", "抗割", "逻辑", "情绪", "抽象"];

        document.getElementById('res-icon').innerText = p.icon;
        document.getElementById('res-name').innerText = p.name;
        document.getElementById('res-id').innerText = p.id;
        document.getElementById('res-tags').innerText = p.tags;
        document.getElementById('res-desc').innerText = p.desc;
        document.getElementById('res-radar').innerHTML = dynamicR.map((v, i) => `
            <div class="radar-item">
                <span class="radar-val">${v}</span>
                <span class="radar-label">${labels[i]}</span>
            </div>
        `).join('');
        window.scrollTo(0, 0);
    }
    
    render();
</script>
</body>
</html>
